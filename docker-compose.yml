---
# Audiobooks - Docker Compose Configuration
#
# Quick Start:
#   export AUDIOBOOK_DIR=/path/to/your/audiobooks
#   docker-compose up -d
#
# Access:
#   Web UI: https://localhost:8443 (HTTPS)
#           http://localhost:8080 (redirects to HTTPS)
#
# First-time setup (scan audiobooks):
#   docker exec -it audiobooks python3 /app/scanner/scan_audiobooks.py
#   docker exec -it audiobooks python3 /app/backend/import_to_db.py
#
# Note: Browser will show security warning (self-signed certificate)
#       Click 'Advanced' -> 'Proceed to localhost' to continue

services:
  audiobooks:
    # Option 1: Pull from GHCR (recommended) — pinned to release tag for reproducibility
    image: ghcr.io/theboscoclub/audiobook-manager:8.3.9
    # Option 2: Build locally (uncomment below, comment out image above)
    # build: .
    container_name: audiobooks
    ports:
      - "${WEB_PORT:-8443}:8443"   # HTTPS web interface
      - "${HTTP_PORT:-8080}:8080"  # HTTP redirect to HTTPS
      # Note: API port 5001 is internal only (not exposed)
    volumes:
      # Mount your audiobook directory (read-only for safety)
      # The Library subdirectory contains converted OPUS files
      - ${AUDIOBOOK_DIR:-/path/to/audiobooks}:/audiobooks:ro

      # Mount supplements directory (PDFs, course materials, etc.)
      - ${SUPPLEMENTS_DIR:-/path/to/supplements}:/supplements:ro

      # Persist database across container restarts
      - audiobooks_data:/app/data

      # Persist cover art cache
      - audiobooks_covers:/app/covers

      # Authentication state — only mounted when AUTH_ENABLED=true.
      # On fresh/standalone Docker installs these volumes start empty; run
      # `docker exec audiobooks-docker audiobooks-auth init` (or equivalent)
      # to seed `auth.db` + `auth.key`. On QA/prod-mirror hosts bind-mount the
      # host paths instead:
      #   - /var/lib/audiobooks/auth.db:/app/auth/auth.db
      #   - /etc/audiobooks/auth.key:/app/auth/auth.key:ro
      - audiobooks_auth:/app/auth

    environment:
      # Path to audiobooks inside container
      - AUDIOBOOK_DIR=/audiobooks

      # Database location (persisted via volume)
      - DATABASE_PATH=/app/data/audiobooks.db

      # Cover art cache location
      - COVER_DIR=/app/covers

      # Supplements directory (PDFs, maps, etc.)
      - SUPPLEMENTS_DIR=/supplements

      # Server ports (match exposed ports)
      - WEB_PORT=8443
      - API_PORT=5001
      - HTTP_REDIRECT_PORT=8080
      # Gunicorn+geventwebsocket is used automatically (migrated from Waitress in v7.2)
      - HTTP_REDIRECT_ENABLED=true

      # Instance identifier rendered as a pulsing pill in the shell header.
      # Optional — leave unset for production to render no pill. Set to any
      # short string to distinguish stacks during testing (e.g., "STAGING",
      # "QA", "DEV", or operator conventions like "QA-NATIVE" / "QA-DOCK"
      # to disambiguate native vs containerized instances of the same env).
      # API surface: library/backend/api_modular/utilities_system.py:671
      # UI hook:     library/web-v2/shell.html:425
      - INSTANCE_BADGE=${INSTANCE_BADGE:-}

      # Authentication — set AUTH_ENABLED=true for QA/prod-mirror deployments.
      # When true, api_server.py requires AUTH_DATABASE and AUTH_KEY_FILE to
      # point at a valid SQLCipher auth.db and matching 64-hex-char key file;
      # without both, Flask silently falls back to AUTH_ENABLED=False and no
      # /auth/* blueprints register (all /auth/login POSTs return 405).
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_DATABASE=/app/auth/auth.db
      - AUTH_KEY_FILE=/app/auth/auth.key

    restart: unless-stopped

    # Health check — exercises the API health endpoint so compose/orchestrator
    # can detect and restart a wedged container. Matches Dockerfile HEALTHCHECK.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/system/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  audiobooks_data:
    name: audiobooks_data
    driver: local
  audiobooks_covers:
    name: audiobooks_covers
    driver: local
  audiobooks_auth:
    name: audiobooks_auth
    driver: local

# Network configuration (optional)
networks:
  default:
    name: audiobooks_network
