[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: Tests that require the test VM (test-audiobook-cachyos)
    slow: Slow tests (e.g., backoffice operations with polling)
    hardware: Tests requiring physical hardware interaction (e.g., YubiKey touch)
    docker: Tests that build and run Docker containers (require Docker daemon)
    v8: Tests for v8 features (auto-skipped when VERSION major < 8)
