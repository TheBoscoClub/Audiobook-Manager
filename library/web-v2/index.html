<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Library - Audiobook Collection</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/site.webmanifest">
    <!-- Redirect to shell wrapper when loaded as top-level page (not in iframe) -->
    <script>if (window === window.parent) window.location.replace('/');</script>
    <link rel="stylesheet" href="css/library.css?v=1775884000">
    <link rel="stylesheet" href="css/auth.css?v=1775884000">
    <link rel="stylesheet" href="css/notifications.css?v=1775884000">
    <link rel="stylesheet" href="css/tutorial.css?v=1775884000">
    <link rel="stylesheet" href="css/marquee.css?v=1775884000">
    <link rel="stylesheet" href="css/knife-switch.css?v=1775884000">
    <link rel="stylesheet" href="css/modals.css?v=1775884000">
    <link rel="stylesheet" href="css/account.css?v=1775884000">
    <link rel="stylesheet" href="css/a11y-consumer.css?v=1775884000">
    <link rel="stylesheet" href="css/i18n.css?v=1775884000">
</head>
<body>
    <!-- Header -->
    <header class="library-header">
        <div class="header-content">
            <div class="title-section">
                <h1 class="library-title" data-i18n="library.title">The Library</h1>
                <p class="library-subtitle" data-i18n="library.subtitle">A Private Collection of Audiobooks</p>
            </div>
        </div>

        <div class="library-stats">
            <div class="stat-item">
                <span class="stat-value" id="total-books">-</span>
                <span class="stat-label" data-i18n="library.volumes">volumes</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="total-hours">-</span>
                <span class="stat-label" data-i18n="library.hours">hours</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="total-authors">-</span>
                <span class="stat-label" data-i18n="library.authors">authors</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="total-narrators">-</span>
                <span class="stat-label" data-i18n="library.narrators">narrators</span>
            </div>
        </div>
    </header>

    <!-- Notification Banners -->
    <div id="notification-container" class="notification-container"></div>

    <!-- New Books Marquee -->
    <div id="new-books-marquee" class="new-books-marquee hidden"></div>

    <!-- Search and Filters -->
    <div class="search-section">
        <div class="search-container">
            <input type="text"
                   id="search-input"
                   class="search-input"
                   placeholder="Search books, authors, narrators..."
                   data-i18n-placeholder="library.searchPlaceholder">
            <button id="clear-search" class="clear-btn" data-i18n="library.clear">Clear</button>
        </div>

        <div class="filters-container">
            <div class="author-autocomplete" id="author-autocomplete">
                <div class="author-controls">
                    <div class="letter-groups">
                        <button class="letter-group active" data-group="all">All</button>
                        <button class="letter-group" data-group="a-e">A-E</button>
                        <button class="letter-group" data-group="f-j">F-J</button>
                        <button class="letter-group" data-group="k-o">K-O</button>
                        <button class="letter-group" data-group="p-t">P-T</button>
                        <button class="letter-group" data-group="u-z">U-Z</button>
                    </div>
                    <button class="sort-toggle" id="author-sort" title="Toggle sort order">A-Z</button>
                </div>
                <div class="author-search-row">
                    <input type="text"
                           id="author-search"
                           class="filter-select author-input"
                           placeholder="Search authors..."
                   data-i18n-placeholder="library.searchAuthors"
                           autocomplete="off">
                    <button id="author-clear" class="author-clear" title="Clear author filter">&times;</button>
                </div>
                <div class="author-dropdown" id="author-dropdown"></div>
            </div>

            <div class="narrator-autocomplete" id="narrator-autocomplete">
                <div class="narrator-controls">
                    <div class="letter-groups">
                        <button class="letter-group active" data-group="all">All</button>
                        <button class="letter-group" data-group="a-e">A-E</button>
                        <button class="letter-group" data-group="f-j">F-J</button>
                        <button class="letter-group" data-group="k-o">K-O</button>
                        <button class="letter-group" data-group="p-t">P-T</button>
                        <button class="letter-group" data-group="u-z">U-Z</button>
                    </div>
                    <button class="sort-toggle" id="narrator-sort" title="Toggle sort order">A-Z</button>
                </div>
                <div class="narrator-search-row">
                    <input type="text"
                           id="narrator-search"
                           class="filter-select narrator-input"
                           placeholder="Search narrators..."
                   data-i18n-placeholder="library.searchNarrators"
                           autocomplete="off">
                    <button id="narrator-clear" class="narrator-clear" title="Clear narrator filter">&times;</button>
                </div>
                <div class="narrator-dropdown" id="narrator-dropdown"></div>
            </div>

            <div class="filter-actions">
                <select id="sort-filter" class="filter-select">
                    <optgroup label="Title" data-i18n-label="sort.groupTitle">
                        <option value="title:asc" data-i18n="sort.titleAZ">Title (A-Z)</option>
                        <option value="title:desc" data-i18n="sort.titleZA">Title (Z-A)</option>
                    </optgroup>
                    <optgroup label="Author" data-i18n-label="sort.groupAuthor">
                        <option value="author_last:asc" data-i18n="sort.authorLastAZ">Author Last Name (A-Z)</option>
                        <option value="author_last:desc" data-i18n="sort.authorLastZA">Author Last Name (Z-A)</option>
                        <option value="author_first:asc" data-i18n="sort.authorFirstAZ">Author First Name (A-Z)</option>
                        <option value="author_first:desc" data-i18n="sort.authorFirstZA">Author First Name (Z-A)</option>
                        <option value="author:asc" data-i18n="sort.authorFullAZ">Author Full Name (A-Z)</option>
                        <option value="author:desc" data-i18n="sort.authorFullZA">Author Full Name (Z-A)</option>
                        <option value="grouped_author:asc" data-i18n="sort.authorGrouped">Author (Grouped A-Z)</option>
                    </optgroup>
                    <optgroup label="Narrator" data-i18n-label="sort.groupNarrator">
                        <option value="narrator_last:asc" data-i18n="sort.narratorLastAZ">Narrator Last Name (A-Z)</option>
                        <option value="narrator_last:desc" data-i18n="sort.narratorLastZA">Narrator Last Name (Z-A)</option>
                        <option value="narrator_first:asc" data-i18n="sort.narratorFirstAZ">Narrator First Name (A-Z)</option>
                        <option value="narrator_first:desc" data-i18n="sort.narratorFirstZA">Narrator First Name (Z-A)</option>
                        <option value="grouped_narrator:asc" data-i18n="sort.narratorGrouped">Narrator (Grouped A-Z)</option>
                    </optgroup>
                    <optgroup label="Duration" data-i18n-label="sort.groupDuration">
                        <option value="duration_hours:desc" data-i18n="sort.longestFirst">Longest First</option>
                        <option value="duration_hours:asc" data-i18n="sort.shortestFirst">Shortest First</option>
                    </optgroup>
                    <optgroup label="Dates" data-i18n-label="sort.groupDates">
                        <option value="acquired_date:desc" data-i18n="sort.recentlyAcquired">Recently Acquired</option>
                        <option value="acquired_date:asc" data-i18n="sort.oldestAcquired">Oldest Acquired</option>
                        <option value="published_year:desc" data-i18n="sort.newestPublished">Newest Published</option>
                        <option value="published_year:asc" data-i18n="sort.oldestPublished">Oldest Published</option>
                    </optgroup>
                    <optgroup label="Series &amp; Editions" data-i18n-label="sort.groupSeries">
                        <option value="series:asc" data-i18n="sort.seriesAZ">Series (A-Z, books in order)</option>
                        <option value="series:desc" data-i18n="sort.seriesZA">Series (Z-A, books in order)</option>
                        <option value="edition:asc" data-i18n="sort.multipleEditions">Multiple Editions Only</option>
                    </optgroup>
                </select>
                <button id="refresh-btn" class="refresh-btn">↻ Refresh</button>
            </div>
        </div>
    </div>

    <!-- Library Tabs (shown when user is logged in) -->
    <div class="library-tabs" id="library-tabs" style="display: none;">
        <button class="tab-btn active" data-tab="browse" title="Browse the full audiobook collection" data-i18n="library.browseAll">Browse All</button>
        <button class="tab-btn" data-tab="my-library" title="View your listening history and saved books" data-i18n="library.myLibrary">My Library</button>
        <button id="hide-selected-btn" class="hide-btn depressed" style="display: none;" title="Hide selected books from your library view">Hide Selected</button>
        <button id="hidden-books-btn" class="hidden-books-pill" style="display: none;" title="View hidden books"></button>
    </div>

    <!-- Collections Sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="collections-sidebar" id="collections-sidebar">
        <div class="sidebar-header">
            <h2 data-i18n="library.collections">Collections</h2>
            <button class="sidebar-close" id="sidebar-close" title="Close sidebar">&times;</button>
        </div>
        <div class="sidebar-content" id="collections-buttons">
            <!-- Collection buttons loaded dynamically -->
        </div>
        <div class="sidebar-footer">
            <button class="sidebar-clear" id="sidebar-clear-filter" data-i18n="library.clearFilter">Clear Filter</button>
        </div>
    </aside>

    <!-- Results Info with Sidebar Toggle -->
    <div class="results-info">
        <div class="results-left">
            <button class="sidebar-toggle" id="sidebar-toggle" title="Browse Collections">
                <span class="toggle-icon">☰</span>
                <span class="toggle-text" data-i18n="library.collections">Collections</span>
                <span class="active-filter" id="active-filter-badge"></span>
            </button>
            <p id="showing-count" data-i18n="common.loading">Loading...</p>
        </div>
        <div class="pagination-controls" id="top-pagination"></div>
    </div>

    <!-- Audiobooks Grid -->
    <div class="books-grid" id="books-grid">
        <!-- Books will be loaded here -->
    </div>

    <!-- Pagination -->
    <div class="pagination-section">
        <div class="pagination-controls" id="bottom-pagination"></div>
        <div class="per-page-control">
            <label for="per-page">Items per page:</label>
            <select id="per-page" class="filter-select">
                <option value="25">25</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
            </select>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Loading audiobooks...</p>
    </div>

    <!-- My Account Modal -->
    <div class="modal" id="account-modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>My Account</h2>
                <button class="modal-close" id="account-modal-close" title="Close My Account">&times;</button>
            </div>
            <div class="modal-body">
                <div class="account-section">
                    <h3>Profile</h3>
                    <div class="account-field">
                        <label>Username</label>
                        <span id="acct-username" class="editable-field" title="Click to edit username"></span>
                        <input id="acct-username-input" class="edit-input" hidden maxlength="24" title="New username">
                        <button class="btn-inline" id="acct-username-save" hidden title="Save username change">Save</button>
                        <button class="btn-inline" id="acct-username-cancel" hidden title="Cancel">Cancel</button>
                    </div>
                    <div class="account-field">
                        <label>Email</label>
                        <span id="acct-email" class="editable-field" title="Click to edit email"></span>
                        <input id="acct-email-input" class="edit-input" hidden type="email" title="New email address">
                        <button class="btn-inline" id="acct-email-save" hidden title="Save email change">Save</button>
                        <button class="btn-inline" id="acct-email-cancel" hidden title="Cancel">Cancel</button>
                    </div>
                    <div class="account-field">
                        <label>Member since</label>
                        <span id="acct-created"></span>
                    </div>
                </div>
                <div class="account-section">
                    <h3>Authentication</h3>
                    <div class="account-field">
                        <label>Current method</label>
                        <span id="acct-auth-badge" class="auth-badge"></span>
                    </div>
                    <div class="auth-actions">
                        <button class="btn btn-secondary" id="auth-switch-btn" title="Switch to a different authentication method">Switch Method</button>
                        <button class="btn btn-secondary" id="auth-reset-btn" title="Reset your authentication credentials">Reset Credentials</button>
                    </div>
                    <div id="auth-switch-panel" hidden>
                        <div class="radio-group">
                            <label title="Time-based one-time password"><input type="radio" name="switch_auth" value="totp"> TOTP</label>
                            <label title="Login link via email"><input type="radio" name="switch_auth" value="magic_link"> Magic Link</label>
                            <label title="FIDO2 hardware key"><input type="radio" name="switch_auth" value="passkey"> Passkey</label>
                        </div>
                        <button class="btn btn-primary" id="auth-switch-confirm" title="Confirm auth method switch">Switch</button>
                    </div>
                    <div id="auth-setup-result" hidden></div>
                </div>
                <div class="account-section">
                    <div class="auth-actions">
                        <a href="contact.html" class="btn btn-secondary" id="contact-admin-btn" title="Send a message to the admin">Contact Admin</a>
                        <button class="btn btn-secondary" id="sign-out-btn" title="Sign out of your account">Sign Out</button>
                    </div>
                </div>
                <div class="account-section danger-zone">
                    <h3>Danger Zone</h3>
                    <button class="btn btn-danger" id="delete-account-btn" title="Permanently delete your account">Delete My Account</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Safe JSON response parser — handles Cloudflare HTML error pages
        async function safeJsonParse(response) {
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch {
                // Response is not JSON (e.g., Cloudflare WAF block page)
                if (text.includes('<!DOCTYPE') || text.includes('<!doctype')) {
                    throw new Error('Request was blocked by the firewall. Please try again or contact admin.');
                }
                throw new Error('Unexpected server response');
            }
        }
    </script>

    <script>
    // Door knocker sound effect for Help button
    (function () {
        var knocker = document.getElementById("help-knocker-link");
        if (!knocker) return;
        var audioCtx = null;
        function getCtx() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (e) { return null; }
            }
            return audioCtx;
        }
        function playKnock() {
            var ctx = getCtx();
            if (!ctx) return;
            // Deep wooden knock — short sine burst + filtered noise
            var osc = ctx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = 120;
            var g = ctx.createGain();
            g.gain.setValueAtTime(0.3, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            osc.connect(g);
            g.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
            // Wood texture (filtered noise)
            var dur = 0.08;
            var buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
            var d = buf.getChannelData(0);
            for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.15;
            var src = ctx.createBufferSource();
            src.buffer = buf;
            var lp = ctx.createBiquadFilter();
            lp.type = "lowpass";
            lp.frequency.value = 400;
            var g2 = ctx.createGain();
            g2.gain.setValueAtTime(0.2, ctx.currentTime);
            g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
            src.connect(lp);
            lp.connect(g2);
            g2.connect(ctx.destination);
            src.start();
        }
        knocker.addEventListener("click", playKnock);
    })();
    </script>

    <!-- Toast notifications (auto-dismiss, bottom-right) -->
    <div class="toast-container" id="toast-container"></div>
</body>
</html>
