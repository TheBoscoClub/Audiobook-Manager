<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>403 - Access Denied</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="css/theme-art-deco.css?v=1775585227">
    <link rel="stylesheet" href="css/auth.css?v=1775585227">
    <link rel="stylesheet" href="css/responsive.css?v=1775585227">
    <link rel="stylesheet" href="css/i18n.css?v=1775585227">
    <script data-cfasync="false" src="js/i18n.js?v=1775585227"></script>
</head>
<body class="auth-page">
    <div class="auth-container error-page-container">
        <div class="auth-header">
            <div class="deco-ornament">&#9830;</div>
            <div class="deco-line"></div>
        </div>

        <div class="error-code">403</div>
        <h1 class="error-title" data-i18n="error.forbidden">Access Denied</h1>
        <p class="error-description" data-i18n="error.forbiddenDesc">
            You do not have permission to access this resource.
            If you believe this is an error, please contact the administrator.
        </p>

        <div class="auth-options" style="margin-top: 2rem;">
            <a href="index.html" class="auth-link" data-i18n="error.returnToLibrary">Return to Library</a>
            <span class="auth-divider">|</span>
            <a href="login.html" class="auth-link" data-i18n="error.signInDifferent">Sign In as Different User</a>
        </div>

        <div class="auth-footer">
            <div class="deco-ornament small">&#9830;</div>
        </div>
    </div>
</body>
</html>
