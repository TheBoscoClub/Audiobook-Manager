<!DOCTYPE html>
<html lang="en" data-page-title-key="chrome.title.shell">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Library - Audiobook Collection</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="css/shell.css?v=1775921000">
    <link rel="stylesheet" href="css/maintenance-banner.css?v=1775921000">
    <link rel="stylesheet" href="css/theme-art-deco.css?v=1775921000">
    <link rel="stylesheet" href="css/modals.css?v=1775921000">
    <link rel="stylesheet" href="css/account.css?v=1775921000">
    <link rel="stylesheet" href="css/accessibility.css?v=1775921000">
    <link rel="stylesheet" href="css/i18n.css?v=1775921000">
    <style>
        .instance-badge {
            display: inline-block;
            background: #cc0000;
            color: #fff;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            padding: 3px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            vertical-align: middle;
            margin-left: 8px;
            border: 2px solid #ff4444;
            animation: badge-pulse 2s ease-in-out infinite;
        }
        @keyframes badge-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <!-- Shell header with account access -->
    <div id="shell-header">
        <!-- Left group -->
        <div class="header-group-left">
            <button id="my-account-btn" class="header-btn account-btn" title="My Account settings">
                <span class="account-icon" id="account-initial">?</span>
                <span id="account-username" data-i18n="shell.account">Account</span>
            </button>
            <span id="instance-badge" class="instance-badge" style="display:none"></span>
            <!-- Accessibility quick-panel toggle -->
            <button id="accessibility-btn" class="header-btn a11y-btn" title="Accessibility &amp; display settings">
                <span class="a11y-icon">
                    <svg viewBox="0 0 30 22" width="22" height="16" aria-hidden="true">
                        <!-- Left lens (half-frame) -->
                        <path d="M3 10 Q3 3 8 3 L12 3 Q14 3 14 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <!-- Right lens (half-frame) -->
                        <path d="M16 10 Q16 3 18 3 L22 3 Q27 3 27 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <!-- Bridge -->
                        <path d="M14 5 Q15 1.5 16 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <!-- Left temple arm -->
                        <line x1="3" y1="5" x2="0" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Right temple arm -->
                        <line x1="27" y1="5" x2="30" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Chain hanging from temples -->
                        <path d="M0 4 Q5 20 15 18 Q25 16 30 4" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2" opacity="0.6"/>
                    </svg>
                </span>
                <span class="a11y-label" data-i18n="shell.display">Display</span>
            </button>
            <!-- Locale switcher -->
            <div class="locale-switcher" id="locale-switcher" title="Language / 语言">
                <svg class="locale-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2c3 3.6 3 16.4 0 20"/>
                    <path d="M12 2c-3 3.6-3 16.4 0 20"/>
                </svg>
                <select id="locale-select" aria-label="Language">
                    <option value="en">EN</option>
                    <option value="zh-Hans">中文</option>
                </select>
            </div>
        </div>
        <!-- Right group -->
        <div class="header-group-right">
            <a href="help.html" target="content-frame" class="header-btn help-btn" id="help-knocker-link" title="Help &amp; User Guide">
                <span class="help-icon">?</span>
                <span class="help-label" data-i18n="shell.help">Help</span>
            </a>
            <a href="utilities.html" target="content-frame" id="admin-backoffice-link" class="header-btn backoffice-btn" hidden title="Library Administration — Staff Only">
                <span class="backoffice-icon">
                    <svg viewBox="0 0 24 32" width="14" height="18" aria-hidden="true">
                        <ellipse cx="12" cy="10" rx="7" ry="8" fill="none" stroke="currentColor" stroke-width="2"/>
                        <rect x="9" y="16" width="6" height="12" rx="1" fill="currentColor"/>
                        <ellipse cx="12" cy="10" rx="3" ry="3.5" fill="var(--deco-charcoal, #161616)"/>
                        <rect x="10.5" y="12" width="3" height="5" fill="var(--deco-charcoal, #161616)"/>
                    </svg>
                </span>
                <span class="backoffice-label">Back Office</span>
            </a>
        </div>
    </div>

    <!-- Accessibility Quick Panel -->
    <div id="a11y-panel" class="a11y-panel" hidden>
        <div class="a11y-panel-header">
            <h3 data-i18n="a11y.title">Accessibility</h3>
            <button id="a11y-panel-close" class="drawer-close-btn" title="Close" data-i18n-title="a11y.close">&times;</button>
        </div>
        <div class="a11y-panel-body">
            <div class="a11y-control">
                <label for="a11y-font-size" data-i18n="a11y.fontSize">Font Size</label>
                <div class="a11y-segmented" id="a11y-font-size" data-key="font_size">
                    <button data-value="14" title="Small (14px)" data-i18n-title="a11y.fontSmall">A</button>
                    <button data-value="16" title="Default (16px)" data-i18n-title="a11y.fontDefault" class="active">A</button>
                    <button data-value="18" title="Large (18px)" data-i18n-title="a11y.fontLarge">A</button>
                    <button data-value="20" title="Extra large (20px)" data-i18n-title="a11y.fontXLarge">A</button>
                </div>
            </div>
            <div class="a11y-control">
                <label for="a11y-line-spacing" data-i18n="a11y.lineSpacing">Line Spacing</label>
                <div class="a11y-segmented" id="a11y-line-spacing" data-key="line_spacing">
                    <button data-value="1.2" title="Compact" data-i18n-title="a11y.spacingCompact">1.2</button>
                    <button data-value="1.5" title="Default" data-i18n-title="a11y.spacingDefault" class="active">1.5</button>
                    <button data-value="1.8" title="Relaxed" data-i18n-title="a11y.spacingRelaxed">1.8</button>
                </div>
            </div>
            <div class="a11y-control">
                <label for="a11y-contrast" data-i18n="a11y.contrast">Contrast</label>
                <div class="a11y-segmented" id="a11y-contrast" data-key="contrast">
                    <button data-value="normal" title="Normal contrast" data-i18n-title="a11y.contrastNormal" data-i18n="a11y.labelNormal" class="active">Normal</button>
                    <button data-value="medium" title="Medium contrast" data-i18n-title="a11y.contrastMedium" data-i18n="a11y.labelMedium">Medium</button>
                    <button data-value="high" title="High contrast" data-i18n-title="a11y.contrastHigh" data-i18n="a11y.labelHigh">High</button>
                </div>
            </div>
            <div class="a11y-control">
                <label for="a11y-bg-opacity" data-i18n="a11y.bgOpacity">Panel Darkness</label>
                <input type="range" id="a11y-bg-opacity" min="50" max="100" value="100"
                       data-key="bg_opacity" title="Adjust background darkness" data-i18n-title="a11y.bgOpacityTitle">
                <span id="a11y-bg-opacity-val" class="a11y-range-val">100%</span>
            </div>
            <div class="a11y-control">
                <label for="a11y-color-temp" data-i18n="a11y.colorTemp">Color Tone</label>
                <div class="a11y-segmented" id="a11y-color-temp" data-key="color_temperature">
                    <button data-value="warm" title="Warm (golden)" data-i18n-title="a11y.toneWarm" data-i18n="a11y.labelWarm">Warm</button>
                    <button data-value="neutral" title="Default" data-i18n-title="a11y.toneNeutral" data-i18n="a11y.labelNeutral" class="active">Neutral</button>
                    <button data-value="cool" title="Cool (blue-white)" data-i18n-title="a11y.toneCool" data-i18n="a11y.labelCool">Cool</button>
                </div>
            </div>
            <div class="a11y-control a11y-toggle-row">
                <label for="a11y-reduce-motion" data-i18n="a11y.reduceMotion">Reduce Animations</label>
                <input type="checkbox" id="a11y-reduce-motion" data-key="reduce_animations" title="Minimize motion and animations" data-i18n-title="a11y.reduceMotionTitle">
            </div>
            <div class="a11y-control a11y-toggle-row">
                <label for="a11y-high-contrast" data-i18n="a11y.highContrast">High Contrast Mode</label>
                <input type="checkbox" id="a11y-high-contrast" data-key="high_contrast" title="Increase text and border contrast" data-i18n-title="a11y.highContrastTitle">
            </div>
            <div class="a11y-control a11y-reset">
                <button id="a11y-reset-btn" class="btn btn-secondary" title="Reset all accessibility settings to defaults" data-i18n-title="a11y.resetDefaultsTitle" data-i18n="a11y.resetDefaults">Reset Defaults</button>
            </div>
        </div>
    </div>

    <!-- Content iframe: loads all authenticated pages -->
    <iframe id="content-frame" name="content-frame" src="index.html?v=1775921000" title="Library content"></iframe>

    <!-- Persistent player bar (hidden until a book is played) -->
    <div id="shell-player" hidden>
        <div class="player-cover-wrap">
            <img id="sp-cover" src="" alt="" class="sp-cover">
        </div>
        <div class="player-info-bar">
            <div class="sp-title" id="sp-title">-</div>
            <div class="sp-author" id="sp-author">-</div>
        </div>
        <div class="player-controls-bar">
            <button class="sp-btn" id="sp-rewind" title="Back 30 seconds" data-i18n="player.backSeconds" data-i18n-title="player.back30">-30s</button>
            <button class="sp-btn sp-play" id="sp-play-pause" title="Play / Pause" data-i18n-title="player.playPause">&#9654;</button>
            <button class="sp-btn" id="sp-forward" title="Forward 30 seconds" data-i18n="player.forwardSeconds" data-i18n-title="player.forward30">+30s</button>
        </div>
        <div class="player-progress-bar">
            <span id="sp-current-time">0:00</span>
            <input type="range" id="sp-progress" class="sp-progress" min="0" max="1000" value="0">
            <span id="sp-total-time">0:00</span>
        </div>
        <div class="player-extras-bar">
            <button class="sp-btn sp-btn-sm sp-volume-icon" id="sp-volume-icon" title="Mute / Unmute" data-i18n-title="player.muteUnmute">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
                    <path id="sp-volume-path" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0012 8.5v1.5a3 3 0 010 4V15.5a4.5 4.5 0 004.5-4.5zM12 3.23v2.06a7 7 0 010 13.42v2.06A9 9 0 0021 12 9 9 0 0012 3.23z"/>
                </svg>
            </button>
            <input type="range" id="sp-volume" class="sp-volume" min="0" max="100" value="100" title="Volume" data-i18n-title="player.volume">
            <span id="sp-speed-display">1x</span>
            <button class="sp-btn sp-btn-sm" id="sp-speed" title="Click: faster · Right-click/Shift+click: slower" data-i18n="player.speed">Speed</button>
            <button class="sp-btn sp-btn-sm" id="sp-subtitle-toggle" title="Toggle subtitles (CC)" data-i18n-title="player.toggleSubtitles" style="display:none;">CC</button>
            <button class="sp-btn sp-btn-sm" id="sp-transcript-toggle" title="Toggle transcript panel" data-i18n-title="player.toggleTranscript" style="display:none;">&#9776;</button>
            <button class="sp-btn sp-btn-sm" id="sp-lang-toggle" title="Switch audio language" data-i18n-title="player.switchLanguage" style="display:none;">&#127760;</button>
            <button class="sp-btn sp-btn-sm sp-close" id="sp-close" title="Close player" data-i18n-title="player.close">&times;</button>
        </div>
        <!-- Subtitle display (below player controls) -->
        <div id="subtitle-display" class="subtitle-display" style="display:none;">
            <div id="subtitle-source" class="subtitle-line subtitle-source"></div>
            <div id="subtitle-translated" class="subtitle-line subtitle-translated"></div>
        </div>
        <!-- Subtitle generation banner (on-demand STT/translation) -->
        <div id="subtitle-gen-banner" class="subtitle-gen-banner" style="display:none;">
            <div class="sgb-idle">
                <span class="sgb-message" data-i18n="subtitleGen.offer">Translated subtitles aren't available for this book yet. Generate them now?</span>
                <button type="button" class="sgb-button" id="sgb-generate" data-i18n="subtitleGen.generate">Generate subtitles</button>
            </div>
            <div class="sgb-progress" style="display:none;">
                <div class="sgb-spinner" aria-hidden="true"></div>
                <div class="sgb-progress-text">
                    <div class="sgb-phase" id="sgb-phase" data-i18n="subtitleGen.starting">Starting…</div>
                    <div class="sgb-detail" id="sgb-detail"></div>
                </div>
            </div>
        </div>
        <audio id="audio-element"></audio>
    </div>

    <!-- Transcript side panel -->
    <div id="transcript-panel" class="transcript-panel" style="display:none;">
        <div class="transcript-header">
            <h3 data-i18n="player.transcript">Transcript</h3>
            <button class="transcript-close" id="transcript-close" title="Close transcript" data-i18n-title="a11y.close">&times;</button>
        </div>
        <div id="transcript-content" class="transcript-content"></div>
    </div>

    <!-- My Account Modal -->
    <div class="modal" id="account-modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 data-i18n="account.title">My Account</h2>
                <button class="modal-close" id="account-modal-close" title="Close My Account">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Profile Section -->
                <div class="account-section">
                    <h3 data-i18n="account.profile">Profile</h3>
                    <div class="account-field">
                        <label data-i18n="account.username">Username</label>
                        <span id="acct-username" class="editable-field" title="Click to edit username"></span>
                        <input id="acct-username-input" class="edit-input" hidden maxlength="24" title="New username">
                        <button class="btn-inline" id="acct-username-save" hidden title="Save username change" data-i18n="common.save">Save</button>
                        <button class="btn-inline" id="acct-username-cancel" hidden title="Cancel" data-i18n="common.cancel">Cancel</button>
                    </div>
                    <div class="account-field">
                        <label data-i18n="account.email">Email</label>
                        <span id="acct-email" class="editable-field" title="Click to edit email"></span>
                        <input id="acct-email-input" class="edit-input" hidden type="email" title="New email address">
                        <button class="btn-inline" id="acct-email-save" hidden title="Save email change" data-i18n="common.save">Save</button>
                        <button class="btn-inline" id="acct-email-cancel" hidden title="Cancel" data-i18n="common.cancel">Cancel</button>
                    </div>
                    <div class="account-field">
                        <label data-i18n="account.memberSince">Member since</label>
                        <span id="acct-created"></span>
                    </div>
                </div>

                <!-- Authentication Section -->
                <div class="account-section">
                    <h3 data-i18n="account.authentication">Authentication</h3>
                    <div class="account-field">
                        <label data-i18n="account.authMethod">Current method</label>
                        <span id="acct-auth-badge" class="auth-badge"></span>
                    </div>
                    <div class="auth-actions">
                        <button class="btn btn-secondary" id="auth-switch-btn" title="Switch to a different authentication method">Switch Method</button>
                        <button class="btn btn-secondary" id="auth-reset-btn" title="Reset your authentication credentials">Reset Credentials</button>
                    </div>
                    <div id="auth-switch-panel" hidden>
                        <div class="radio-group">
                            <label title="Time-based one-time password"><input type="radio" name="switch_auth" value="totp"> TOTP</label>
                            <label title="Login link via email"><input type="radio" name="switch_auth" value="magic_link"> Magic Link</label>
                            <label title="FIDO2 hardware key"><input type="radio" name="switch_auth" value="passkey"> Passkey</label>
                        </div>
                        <button class="btn btn-primary" id="auth-switch-confirm" title="Confirm auth method switch">Switch</button>
                    </div>
                    <div id="auth-setup-result" hidden></div>
                </div>

                <!-- Quick Actions -->
                <div class="account-section">
                    <div class="auth-actions">
                        <a href="contact.html" class="btn btn-secondary" id="contact-admin-btn" title="Send a message to the admin" data-i18n="account.contactAdmin">Contact Admin</a>
                        <button class="btn btn-secondary" id="sign-out-btn" title="Sign out of your account" data-i18n="account.signOut">Sign Out</button>
                    </div>
                </div>

                <!-- Preferences Section -->
                <div class="account-section" id="prefs-section">
                    <h3 data-i18n="prefs.browsing">Browsing</h3>
                    <div class="account-field">
                        <label for="pref-sort-order" data-i18n="prefs.sortOrder">Sort order</label>
                        <select id="pref-sort-order" class="pref-select" data-key="sort_order" title="Default sort order for the library">
                            <option value="title_asc" data-i18n="sort.titleAZ">Title A–Z</option>
                            <option value="title_desc" data-i18n="sort.titleZA">Title Z–A</option>
                            <option value="author_last_asc" data-i18n="sort.authorLastAZ">Author Last Name A–Z</option>
                            <option value="author_last_desc" data-i18n="sort.authorLastZA">Author Last Name Z–A</option>
                            <option value="author_asc" data-i18n="sort.authorFullAZ">Author Full Name A–Z</option>
                            <option value="author_desc" data-i18n="sort.authorFullZA">Author Full Name Z–A</option>
                            <option value="narrator_last_asc" data-i18n="sort.narratorLastAZ">Narrator Last Name A–Z</option>
                            <option value="narrator_last_desc" data-i18n="sort.narratorLastZA">Narrator Last Name Z–A</option>
                            <option value="acquired_date_desc" data-i18n="sort.recentlyAcquired">Recently Acquired</option>
                            <option value="acquired_date_asc" data-i18n="sort.oldestAcquired">Oldest Acquired</option>
                            <option value="duration_hours_desc" data-i18n="sort.longestFirst">Longest First</option>
                            <option value="duration_hours_asc" data-i18n="sort.shortestFirst">Shortest First</option>
                            <option value="series_asc" data-i18n="sort.seriesAZ">Series A–Z</option>
                        </select>
                    </div>
                    <div class="account-field">
                        <label for="pref-view-mode" data-i18n="prefs.viewMode">View mode</label>
                        <div class="pref-toggle-group" id="pref-view-mode" data-key="view_mode">
                            <button data-value="grid" class="active" title="Grid view" data-i18n="prefs.grid">Grid</button>
                            <button data-value="list" title="List view" data-i18n="prefs.list">List</button>
                        </div>
                    </div>
                    <div class="account-field">
                        <label for="pref-items-per-page" data-i18n="prefs.itemsPerPage">Items per page</label>
                        <select id="pref-items-per-page" class="pref-select" data-key="items_per_page" title="Number of items shown per page">
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="200">200</option>
                        </select>
                    </div>
                    <div class="account-field">
                        <label for="pref-content-filter" data-i18n="prefs.contentFilter">Content filter</label>
                        <select id="pref-content-filter" class="pref-select" data-key="content_filter" title="Filter library content">
                            <option value="all" data-i18n="prefs.allContent">All content</option>
                            <option value="audiobooks" data-i18n="prefs.audiobooksOnly">Audiobooks only</option>
                        </select>
                    </div>
                    <div class="account-field">
                        <label for="pref-locale" data-i18n="prefs.language">Language</label>
                        <select id="pref-locale" class="pref-select" data-key="locale" title="Display language / 显示语言">
                            <option value="en">English</option>
                            <option value="zh-Hans">简体中文 (Simplified Chinese)</option>
                        </select>
                    </div>

                    <h3 style="margin-top:1.2em" data-i18n="prefs.playback">Playback</h3>
                    <div class="account-field">
                        <label for="pref-playback-speed" data-i18n="prefs.defaultSpeed">Default speed</label>
                        <select id="pref-playback-speed" class="pref-select" data-key="playback_speed" title="Default playback speed">
                            <option value="0.75">0.75×</option>
                            <option value="1">1×</option>
                            <option value="1.25">1.25×</option>
                            <option value="1.5">1.5×</option>
                            <option value="2">2×</option>
                        </select>
                    </div>
                    <div class="account-field">
                        <label for="pref-sleep-timer" data-i18n="prefs.sleepTimer">Sleep timer</label>
                        <select id="pref-sleep-timer" class="pref-select" data-key="sleep_timer" title="Default sleep timer duration">
                            <option value="0" data-i18n="prefs.sleepOff">Off</option>
                            <option value="15">15 min</option>
                            <option value="30">30 min</option>
                            <option value="60">60 min</option>
                        </select>
                    </div>
                    <div class="account-field">
                        <label for="pref-auto-play" data-i18n="prefs.autoPlaySeries">Auto-play series</label>
                        <input type="checkbox" id="pref-auto-play" data-key="auto_play_series" title="Automatically play next book in series">
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="account-section danger-zone">
                    <h3 data-i18n="account.dangerZone">Danger Zone</h3>
                    <button class="btn btn-danger" id="delete-account-btn" title="Permanently delete your account" data-i18n="account.deleteAccount">Delete My Account</button>
                </div>
            </div>
        </div>
    </div>

    <script data-cfasync="false">
        fetch('/api/system/version').then(r => r.json()).then(d => {
            if (d.instance_badge) {
                var el = document.getElementById('instance-badge');
                el.textContent = d.instance_badge;
                el.title = typeof t === "function" ? t("shell.instanceTitle", { name: d.instance_badge }) : d.instance_badge + ' instance';
                el.style.display = '';
            }
        }).catch(function(){});
    </script>
    <script data-cfasync="false" src="js/i18n.js?v=1775921000"></script>
    <script data-cfasync="false" src="js/api.js?v=1775921000"></script>
    <script data-cfasync="false" src="js/utils.js?v=1775921000"></script>
    <script data-cfasync="false" src="js/websocket.js?v=1775921000"></script>
    <script data-cfasync="false" src="js/maintenance-banner.js?v=1775884500"></script>
