<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>401 - Authentication Required</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="css/theme-art-deco.css?v=1774616000">
    <link rel="stylesheet" href="css/auth.css?v=1774616000">
    <link rel="stylesheet" href="css/responsive.css?v=1774616000">
</head>
<body class="auth-page">
    <div class="auth-container error-page-container">
        <div class="auth-header">
            <div class="deco-ornament">&#9830;</div>
            <div class="deco-line"></div>
        </div>

        <div class="error-code">401</div>
        <h1 class="error-title">Authentication Required</h1>
        <p class="error-description">
            You must sign in to access The Library.
            Please enter your credentials to continue.
        </p>

        <a href="login.html" class="auth-button" style="display: block; text-align: center; text-decoration: none;">
            <span class="button-text">Sign In</span>
        </a>

        <div class="auth-footer">
            <div class="deco-ornament small">&#9830;</div>
        </div>
    </div>
</body>
</html>
