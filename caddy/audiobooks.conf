# Audiobooks reverse-proxy front door (two sites).
#
# Cloudflare tunnel ingress routes (replace <domain> with your own):
#   <env>lib.<domain>    -> this host :8084  (NATIVE app, matches production)
#   <env>docker.<domain> -> this host :8085  (DOCKER app, explicit opt-in)
#
# install.sh / upgrade.sh substitute __NATIVE_PORT__ and __DOCKER_PORT__ with
# AUDIOBOOKS_WEB_PORT (default 8090) and AUDIOBOOKS_DOCKER_PORT (default 8443).
#
# handle_errors 502/503 serves maintenance.html when the upstream is down,
# so `<env>docker` on a native-only VM (or vice-versa) returns a friendly page
# instead of a raw connection error.

:8084 {
	reverse_proxy https://localhost:__NATIVE_PORT__ {
		transport http {
			tls_insecure_skip_verify
		}
	}

	handle_errors 502 503 {
		@statusJson path /upgrade-status.json
		handle @statusJson {
			header Content-Type application/json
			header Access-Control-Allow-Origin *
			file_server {
				root /etc/caddy
			}
		}
		handle {
			rewrite * /maintenance.html
			file_server {
				root /etc/caddy
			}
		}
	}
}

:8085 {
	reverse_proxy https://localhost:__DOCKER_PORT__ {
		transport http {
			tls_insecure_skip_verify
		}
	}

	handle_errors 502 503 {
		@statusJson path /upgrade-status.json
		handle @statusJson {
			header Content-Type application/json
			header Access-Control-Allow-Origin *
			file_server {
				root /etc/caddy
			}
		}
		handle {
			rewrite * /maintenance.html
			file_server {
				root /etc/caddy
			}
		}
	}
}
