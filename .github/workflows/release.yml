---
name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    name: Build Release Tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # v7.0.0

      - name: Validate version tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "Tag ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION validated"

      - name: Build release tarball
        run: |
          chmod +x create-release.sh
          ./create-release.sh

      - name: Upload build artifacts
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1
        with:
          name: release-artifacts
          path: |
            build/*.tar.gz
            build/*.sha256
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        # v8.0.1
        with:
          name: release-artifacts
          path: artifacts

      - name: Get version from tag
        id: version
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Upload or create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets only"
            gh release upload "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$REPO" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --repo "$REPO" \
              --generate-notes \
              artifacts/*.tar.gz artifacts/*.sha256
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # v7.0.0

      - name: Get version from tag
        id: version
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Docker image version: $VERSION"

      - name: Validate version tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "Tag ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION validated"

      - name: Set up QEMU
        uses: >-
          docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        # v4.2.0

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        # v4.2.0

      - name: Login to GitHub Container Registry
        uses: >-
          docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: >-
          docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: >-
          docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
