---
name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    name: Build Release Tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Validate version tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "Tag ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION validated"

      - name: Build release tarball
        run: |
          chmod +x create-release.sh
          ./create-release.sh

      - name: Upload build artifacts
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1
        with:
          name: release-artifacts
          path: |
            build/*.tar.gz
            build/*.sha256
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: >-
          actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        # v8.0.1
        with:
          name: release-artifacts
          path: artifacts

      - name: Get version from tag
        id: version
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Upload or create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets only"
            gh release upload "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$REPO" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --repo "$REPO" \
              --generate-notes \
              artifacts/*.tar.gz artifacts/*.sha256
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Get version from tag
        id: version
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Docker image version: $VERSION"

      - name: Validate version tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "Tag ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version $TAG_VERSION validated"

      - name: Set up QEMU
        uses: >-
          docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        # v4.0.0

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        # v4.0.0

      - name: Login to GitHub Container Registry
        uses: >-
          docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: >-
          docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: >-
          docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
