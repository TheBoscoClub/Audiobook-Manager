---
name: "Python Security & Quality"

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

jobs:
  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2
      - name: Run Ruff
        uses: >-
          astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b
        # v4.0.0
        with:
          args: "check --output-format=github"

  mypy:
    name: Type Checking
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2
      - name: Set up Python
        uses: >-
          actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        # v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          if [ -f library/requirements.txt ]; then
            pip install -r library/requirements.txt
          fi

      - name: Run mypy
        run: |
          mypy . --ignore-missing-imports --no-error-summary \
            || echo "::warning::Type errors found"
        continue-on-error: true

  bandit:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2
      - name: Set up Python
        uses: >-
          actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r . -x ./tests,./test,./venv,./.venv \
            -f json -o bandit-report.json || true
          bandit -r . -x ./tests,./test,./venv,./.venv \
            -f txt || echo "::warning::Security issues found"
        continue-on-error: true

      - name: Upload Bandit Report
        uses: >-
          actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        # v7.0.1
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  pip-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2
      - name: Set up Python
        uses: >-
          actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        # v6.2.0
        with:
          python-version: '3.14'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          if [ -f library/requirements.txt ]; then
            pip-audit -r library/requirements.txt --desc \
              || echo "::warning::Vulnerable dependencies found"
          else
            echo "No library/requirements.txt found, skipping"
          fi
        continue-on-error: true
