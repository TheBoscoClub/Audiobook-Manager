---
name: CI

"on":
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Set up Python
        uses: >-
          actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        # v6.2.0
        with:
          python-version: '3.14'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Install dependencies
        run: |
          cd library
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run pytest with coverage
        run: |
          cd library
          pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: >-
          codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: library/coverage.xml
          flags: unittests
          name: audiobook-manager
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        # v4.0.0

      - name: Validate Dockerfile
        run: |
          docker buildx build --check -f Dockerfile .
          echo "Dockerfile is valid"

      - name: Build Docker image (no push)
        run: |
          docker buildx build --load -t audiobooks:test -f Dockerfile .
          echo "Docker image builds successfully"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Run ShellCheck
        uses: >-
          ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        # v2.0.0
        with:
          severity: error
          scandir: '.'
          format: gcc
        env:
          SHELLCHECK_OPTS: '-e SC1091'

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        # v6.0.2

      - name: Validate docker-compose.yml
        run: |
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
          echo "docker-compose.yml is valid YAML"

      - name: Validate GitHub Actions workflows
        run: |
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
            echo "$f is valid YAML"
          done
