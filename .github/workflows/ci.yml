---
name: CI

"on":
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        # v6.0.3

      - name: Set up Python
        uses: >-
          actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        # v6.3.0
        with:
          python-version: '3.14'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev ffmpeg

      - name: Install dependencies
        run: |
          cd library
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run pytest with coverage
        run: |
          cd library
          pytest tests/ -v --tb=short --cov=. \
            --cov-config=../.coveragerc.ci --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: >-
          codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: library/coverage.xml
          flags: unittests
          name: audiobook-manager
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        # v6.0.3

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        # v4.2.0

      - name: Validate Dockerfile
        run: |
          docker buildx build --check -f Dockerfile .
          echo "Dockerfile is valid"

      - name: Build Docker image (no push)
        run: |
          docker buildx build --load -t audiobooks:test -f Dockerfile .
          echo "Docker image builds successfully"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        # v6.0.3

      - name: Run ShellCheck
        uses: >-
          ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        # v2.0.0
        with:
          severity: error
          scandir: '.'
          format: gcc
        env:
          SHELLCHECK_OPTS: '-e SC1091'

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        # v6.0.3

      - name: Validate docker-compose.yml
        run: |
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
          echo "docker-compose.yml is valid YAML"

      - name: Validate GitHub Actions workflows
        run: |
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
            echo "$f is valid YAML"
          done

  eslint:
    name: ESLint (web-v2)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: >-
          actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        # v6.0.3

      - name: Set up Node
        uses: >-
          actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: library/web-v2/package-lock.json

      - name: Install dependencies
        run: |
          cd library/web-v2
          npm ci --no-audit --no-fund

      - name: Run ESLint
        run: |
          cd library/web-v2
          npx eslint --config eslint.config.js js/
