---
version: 2
updates:
  # Python dependencies - library root (manifests: requirements.txt,
  # requirements-dev.txt, requirements-docker.txt). The legacy
  # /library/backend entry was removed because that directory has no
  # pip manifest — it was producing zero scans and noise in the dashboard.
  - package-ecosystem: "pip"
    directory: "/library"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Chicago"
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps(py)"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Chicago"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Chicago"
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
